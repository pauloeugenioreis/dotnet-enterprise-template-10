<div class="p-8 max-w-7xl mx-auto animate-fade-in">
  <header class="mb-10">
    <h1 class="text-4xl font-black text-gray-900 tracking-tight">Pedidos</h1>
    <p class="text-gray-500 mt-2 font-medium">Gerenciamento de vendas e entregas.</p>
  </header>

  @if (loading()) {
    <div class="flex justify-center py-20">
      <div class="w-12 h-12 border-4 border-primary-600 border-t-transparent rounded-full animate-spin"></div>
    </div>
  } @else {
    <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50/50">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">ID / Número</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Cliente</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Status</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Total</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          @for (order of orders(); track order.id) {
            <tr class="hover:bg-gray-50/30 transition-colors cursor-pointer">
              <td class="px-6 py-4">
                <div class="text-sm font-black text-gray-900">#{{ order.orderNumber }}</div>
                <div class="text-[10px] text-gray-400 font-mono">{{ order.id }}</div>
              </td>
              <td class="px-6 py-4">
                <div class="text-sm font-bold text-gray-700">{{ order.customerName }}</div>
              </td>
              <td class="px-6 py-4">
                <span [class]="getStatusClass(order.status)" class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter">
                  {{ order.status }}
                </span>
              </td>
              <td class="px-6 py-4 font-black text-gray-900">R$ {{ order.total | number:'1.2-2' }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
