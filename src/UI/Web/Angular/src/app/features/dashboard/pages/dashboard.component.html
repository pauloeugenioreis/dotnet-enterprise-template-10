<div class="p-8 max-w-7xl mx-auto animate-fade-in">
  <header class="mb-10">
    <h1 class="text-4xl font-black text-gray-900 tracking-tight">Dashboard</h1>
    <p class="text-gray-500 mt-2 font-medium">Visão geral do ecossistema enterprise.</p>
  </header>

  <!-- Stats Grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
    <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm hover:shadow-xl transition-all group">
      <div class="w-12 h-12 bg-primary-50 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
        <span class="text-2xl">💰</span>
      </div>
      <p class="text-gray-400 text-sm font-bold uppercase tracking-wider">Receita Total</p>
      <h2 class="text-3xl font-black text-gray-900">R$ 1.250.000</h2>
    </div>

    <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm hover:shadow-xl transition-all group">
      <div class="w-12 h-12 bg-green-50 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
        <span class="text-2xl">📦</span>
      </div>
      <p class="text-gray-400 text-sm font-bold uppercase tracking-wider">Pedidos Ativos</p>
      <h2 class="text-3xl font-black text-gray-900">458</h2>
    </div>

    <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm hover:shadow-xl transition-all group">
      <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
        <span class="text-2xl">⭐</span>
      </div>
      <p class="text-gray-400 text-sm font-bold uppercase tracking-wider">NPS Score</p>
      <h2 class="text-3xl font-black text-gray-900">9.2</h2>
    </div>
  </div>

  <!-- Main Action Card -->
  <div class="bg-primary-600 rounded-[2.5rem] p-12 text-white shadow-2xl shadow-primary-600/30 relative overflow-hidden group">
    <div class="relative z-10">
      <h3 class="text-3xl font-black mb-4">Módulo de Auditoria Ativo</h3>
      <p class="text-primary-100 max-w-lg font-medium leading-relaxed mb-8">
        Todas as transações estão sendo registradas no Event Store para conformidade e rastreabilidade total.
      </p>
      <button class="bg-white text-primary-600 font-bold px-8 py-4 rounded-2xl hover:bg-primary-50 transition-colors shadow-lg">
        Ver Logs de Auditoria
      </button>
    </div>
    <div class="absolute -right-20 -bottom-20 w-80 h-80 bg-primary-500/20 rounded-full blur-3xl group-hover:scale-125 transition-transform"></div>
  </div>
</div>
