<div class="min-h-screen flex items-center justify-center bg-primary-50 p-6">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 animate-fade-in border border-gray-100">
    <div class="flex justify-center mb-8">
      <div class="w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center shadow-lg shadow-primary-600/30">
        <span class="text-white text-3xl font-black">ET</span>
      </div>
    </div>
    
    <h1 class="text-3xl font-black text-center text-gray-900 tracking-tight mb-2">Bem-vindo</h1>
    <p class="text-center text-gray-500 mb-8 font-medium">Acesse a plataforma enterprise</p>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">E-mail</label>
        <input type="email" name="email" [(ngModel)]="email" required
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-primary-600/10 focus:border-primary-600 transition-all outline-none"
          placeholder="seu@email.com">
      </div>

      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Senha</label>
        <input type="password" name="password" [(ngModel)]="password" required
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-primary-600/10 focus:border-primary-600 transition-all outline-none"
          placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="loading() || !loginForm.valid"
        class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary-600/20 transition-all disabled:opacity-50 flex items-center justify-center">
        <span *ngIf="!loading()">Acessar Painel</span>
        <div *ngIf="loading()" class="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
      </button>
    </form>
  </div>
</div>
