<div class="p-8 max-w-7xl mx-auto animate-fade-in">
  <header class="flex justify-between items-center mb-10">
    <div>
      <h1 class="text-4xl font-black text-gray-900 tracking-tight">Produtos</h1>
      <p class="text-gray-500 mt-2 font-medium">Gestão de catálogo e estoque.</p>
    </div>
    <button class="bg-primary-600 hover:bg-primary-700 text-white font-bold px-6 py-3 rounded-2xl shadow-lg shadow-primary-600/20 transition-all">
      + Novo Produto
    </button>
  </header>

  @if (loading()) {
    <div class="flex justify-center py-20">
      <div class="w-12 h-12 border-4 border-primary-600 border-t-transparent rounded-full animate-spin"></div>
    </div>
  } @else {
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (product of products(); track product.id) {
        <div class="bg-white rounded-[2rem] p-6 border border-gray-100 shadow-sm hover:shadow-xl transition-all group">
          <div class="w-full h-48 bg-gray-50 rounded-2xl mb-6 flex items-center justify-center overflow-hidden">
            <span class="text-5xl group-hover:scale-110 transition-transform">📦</span>
          </div>
          <div class="flex justify-between items-start mb-2">
            <h3 class="text-lg font-black text-gray-900 leading-tight">{{ product.name }}</h3>
            <span class="text-primary-600 font-black">R$ {{ product.price | number:'1.2-2' }}</span>
          </div>
          <p class="text-gray-400 text-sm mb-6">{{ product.category }}</p>
          <div class="flex justify-between items-center pt-6 border-t border-gray-50">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Estoque: {{ product.stockQuantity }}</span>
            <button class="text-primary-600 font-bold text-sm hover:underline">Editar</button>
          </div>
        </div>
      }
    </div>
  }
</div>
