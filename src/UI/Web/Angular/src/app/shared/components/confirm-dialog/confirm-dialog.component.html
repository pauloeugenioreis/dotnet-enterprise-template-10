@if (notification.confirmState()) {
  <div class="fixed inset-0 z-[9998] flex items-center justify-center">
    <div
      class="absolute inset-0 bg-black/40 backdrop-blur-sm"
      (click)="notification.confirmState()!.resolve(false)"
    ></div>
    <div class="relative bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full mx-4">
      <div class="flex items-center justify-center w-14 h-14 bg-red-50 rounded-2xl mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-red-500"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      </div>
      <p class="text-gray-900 font-bold text-center text-base mb-8 leading-snug">
        {{ notification.confirmState()!.message }}
      </p>
      <div class="flex gap-3">
        <button
          (click)="notification.confirmState()!.resolve(false)"
          class="flex-1 px-6 py-3 rounded-2xl border border-gray-200 text-gray-600 font-bold text-sm hover:bg-gray-50 transition-colors active:scale-95"
        >
          Cancelar
        </button>
        <button
          (click)="notification.confirmState()!.resolve(true)"
          class="flex-1 px-6 py-3 rounded-2xl bg-red-600 text-white font-bold text-sm hover:bg-red-700 transition-colors active:scale-95 shadow-lg shadow-red-600/30"
        >
          Confirmar
        </button>
      </div>
    </div>
  </div>
}
