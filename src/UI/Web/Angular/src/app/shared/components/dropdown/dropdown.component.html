<div class="relative {{ className }}">
  <button
    type="button"
    (click)="toggle()"
    [class]="'w-full pl-8 pr-12 ' + paddingClass + ' ' + bgClass + ' border-none ' + roundedClass + ' ' + shadowClass + ' outline-none font-black text-xs uppercase tracking-widest text-gray-900 flex justify-between items-center hover:bg-gray-50 transition-all active:scale-[0.98]'"
  >
    <span class="truncate">{{ selectedOption ? selectedOption.label : placeholder }}</span>
    <svg 
      [class]="'w-5 h-5 text-gray-300 transition-transform duration-300 ' + (isOpen() ? 'rotate-180' : '')" 
      fill="none" 
      stroke="currentColor" 
      viewBox="0 0 24 24"
    >
      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  <div *ngIf="isOpen()" 
       class="absolute z-50 w-full mt-3 bg-white border border-gray-50 rounded-[2rem] shadow-2xl shadow-gray-200/50 py-3 overflow-hidden animate-in fade-in zoom-in-95 duration-200">
    <div class="max-h-60 overflow-y-auto">
      <button
        *ngFor="let option of options"
        type="button"
        (click)="select(option)"
        [class]="'w-full text-left px-8 py-4 text-[10px] font-black uppercase tracking-widest transition-colors ' + (value === option.value ? 'bg-primary-50 text-primary-600' : 'text-gray-500 hover:bg-gray-50')"
      >
        {{ option.label }}
      </button>
    </div>
  </div>
</div>
