<div class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none">
  @for (toast of notification.toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-start gap-3 px-5 py-4 rounded-2xl shadow-2xl min-w-[300px] max-w-sm border animate-in slide-in-from-right-4 fade-in duration-300"
      [class]="toastClass(toast.type)"
    >
      <span class="shrink-0 text-lg leading-none mt-0.5">
        @switch (toast.type) {
          @case ('success') {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          }
          @case ('error') {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          }
          @case ('warning') {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
          }
          @case ('info') {
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          }
        }
      </span>
      <p class="flex-1 text-sm font-semibold leading-snug">{{ toast.message }}</p>
      <button
        (click)="dismiss(toast.id)"
        class="shrink-0 opacity-40 hover:opacity-100 transition-opacity leading-none mt-0.5"
        aria-label="Fechar"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  }
</div>
