<div class="flex h-screen bg-gray-100 overflow-hidden font-sans">
  <!-- Sidebar -->
  <div class="w-72 bg-white shadow-2xl relative flex flex-col z-20">
    <div class="p-10 border-b border-gray-50 flex items-center gap-4">
      <div class="w-12 h-12 bg-primary-600 rounded-[1.25rem] flex items-center justify-center text-white font-black text-2xl shadow-xl shadow-primary-600/20">
        ET
      </div>
      <div class="flex flex-col">
        <span class="font-black text-2xl text-gray-900 tracking-tighter">Enterprise</span>
        <span class="text-[10px] font-bold text-primary-600 uppercase tracking-[0.3em] -mt-1">Angular Edition</span>
      </div>
    </div>

    <nav class="mt-10 px-6 flex-1 space-y-3">
      @for (item of menuItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-primary-600 text-white shadow-lg shadow-primary-600/30"
          [routerLinkActiveOptions]="{exact: true}"
          class="flex items-center gap-4 px-6 py-4 rounded-2xl transition-all duration-300 group text-gray-400 hover:bg-gray-50 hover:text-gray-900"
        >
          <span class="text-xl group-hover:scale-110 transition-transform">{{ item.icon }}</span>
          <span class="font-black text-xs uppercase tracking-widest">{{ item.name }}</span>
        </a>
      }
    </nav>

    <!-- User Section -->
    <div class="p-8 border-t border-gray-100 flex flex-col gap-6 bg-gray-50/30">
      <div class="flex items-center gap-4 group cursor-default">
        <div class="w-14 h-14 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-xl shadow-primary-200 group-hover:scale-110 transition-transform">
          {{ userInitial() }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-black text-gray-900 truncate tracking-tight">
            {{ userName() }}
          </p>
          <p class="text-[10px] text-gray-400 font-bold truncate uppercase tracking-widest">{{ user()?.email }}</p>
        </div>
      </div>
      <button
        (click)="handleLogout()"
        class="w-full flex items-center justify-center gap-3 px-6 py-4 bg-white border border-red-100 text-red-500 rounded-2xl hover:bg-red-50 hover:text-white hover:border-red-500 transition-all text-[11px] font-black uppercase tracking-widest active:scale-95 shadow-sm hover:shadow-lg hover:shadow-red-500/20"
      >
        <span class="text-lg">🚪</span> Sair da Conta
      </button>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 overflow-auto bg-gray-50/50 relative">
    <div class="absolute inset-0 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:24px_24px] [mask-image:radial-gradient(ellipse_50%_50%_at_50%_50%,#000_70%,transparent_100%)] opacity-40 pointer-events-none"></div>
    <main class="relative z-10 min-h-full">
      <div class="p-10">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
