<div class="max-w-7xl mx-auto space-y-10 animate-fade-in">
  <header class="flex justify-between items-end">
    <div>
      <h1 class="text-5xl font-black text-gray-900 tracking-tighter">Pedidos</h1>
      <p class="text-gray-500 mt-3 font-medium text-lg">Histórico completo de transações.</p>
    </div>
    <div class="flex gap-4">
      <button 
        @click="handleExport"
        class="p-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md text-gray-400 hover:text-primary-600 transition-all active:scale-95"
        title="Exportar para Excel"
      >
        📊
      </button>
      <button 
        @click="handleOpenNew"
        class="bg-primary-600 hover:bg-primary-700 text-white font-black px-8 py-4 rounded-2xl shadow-lg shadow-primary-600/20 transition-all active:scale-95"
      >
        + Novo Pedido
      </button>
    </div>
  </header>

  <!-- Filter Bar -->
  <div class="grid grid-cols-12 gap-6 items-center">
    <div class="col-span-3 relative group">
      <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-gray-400 group-focus-within:text-primary-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input 
        v-model="searchTerm"
        type="text"
        placeholder="Buscar pedido..."
        class="w-full pl-16 pr-8 py-5 bg-white border-none rounded-3xl shadow-xl shadow-gray-100/50 focus:ring-2 focus:ring-primary-600/20 outline-none transition-all font-bold text-gray-900 placeholder:text-gray-300"
      />
    </div>

    <div class="col-span-4 flex bg-white p-2 rounded-3xl shadow-xl shadow-gray-100/50 gap-2 items-center">
      <div class="flex-1 px-4 py-1">
        <label class="block text-[8px] font-black uppercase text-gray-400 leading-none mb-1">De</label>
        <input 
          v-model="startDate"
          type="date"
          class="w-full bg-transparent border-none outline-none font-bold text-xs text-gray-900 cursor-pointer"
        />
      </div>
      <div class="w-px h-8 bg-gray-100"></div>
      <div class="flex-1 px-4 py-1">
        <label class="block text-[8px] font-black uppercase text-gray-400 leading-none mb-1">Até</label>
        <input 
          v-model="endDate"
          type="date"
          class="w-full bg-transparent border-none outline-none font-bold text-xs text-gray-900 cursor-pointer"
        />
      </div>
    </div>

    <div class="col-span-3">
      <Dropdown 
        v-model="status"
        :options="statusOptions"
      />
    </div>

    <div class="col-span-2 flex justify-end">
      <button 
        @click="clearFilters"
        class="px-8 py-5 text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 hover:text-red-500 transition-colors flex items-center gap-2 group"
      >
        <span class="group-hover:rotate-90 transition-transform duration-300">✕</span>
        Limpar
      </button>
    </div>
  </div>

  <div class="bg-white rounded-[3rem] border border-gray-50 shadow-2xl overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-10 py-6 text-xs font-black uppercase tracking-[0.2em] text-gray-400"># Número</th>
          <th class="px-10 py-6 text-xs font-black uppercase tracking-[0.2em] text-gray-400">Cliente</th>
          <th class="px-10 py-6 text-xs font-black uppercase tracking-[0.2em] text-gray-400">Status</th>
          <th class="px-10 py-6 text-xs font-black uppercase tracking-[0.2em] text-gray-400">Total</th>
          <th class="px-10 py-6 text-xs font-black uppercase tracking-[0.2em] text-gray-400">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-50">
        <template v-if="loading">
          <tr><td colspan="5" class="p-20 text-center"><div class="w-10 h-10 border-4 border-primary-600 border-t-transparent rounded-full animate-spin mx-auto" /></td></tr>
        </template>
        <template v-else>
          <tr v-for="order in orders" :key="order.id" class="hover:bg-gray-50/50 transition-colors group">
            <td class="px-10 py-8 font-black text-gray-900 group-hover:text-primary-600 transition-colors">
              {{ order.orderNumber }}
            </td>
            <td class="px-10 py-8 text-gray-500 font-bold">
              <div>{{ order.customerName }}</div>
              <div class="text-[10px] text-gray-300 uppercase tracking-tighter">{{ order.customerEmail }}</div>
            </td>
            <td class="px-10 py-8">
              <span :class="['px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest', getStatusClass(order.status)]">
                {{ order.status }}
              </span>
            </td>
            <td class="px-10 py-8 text-xl font-black text-gray-900">
              R$ {{ order.total.toLocaleString('pt-BR') }}
            </td>
            <td class="px-10 py-8">
              <div class="flex gap-2">
                <button 
                  @click="handleViewDetails(order)"
                  class="w-10 h-10 flex items-center justify-center bg-gray-50 hover:bg-primary-50 rounded-xl text-primary-600 transition-all active:scale-90" 
                  title="Ver Detalhes"
                >
                  🔍
                </button>
                <button 
                  @click="handleEdit(order)"
                  class="w-10 h-10 flex items-center justify-center bg-gray-50 hover:bg-blue-50 rounded-xl text-blue-600 transition-all active:scale-90" 
                  title="Editar"
                >
                  ✏️
                </button>
                <button 
                  @click="handleCancel(order.id)"
                  class="w-10 h-10 flex items-center justify-center bg-gray-50 hover:bg-red-50 rounded-xl text-red-600 transition-all active:scale-90"
                  :class="{ 'opacity-20 cursor-not-allowed': order.status === 'Cancelled' }"
                  :disabled="order.status === 'Cancelled'"
                  title="Cancelar"
                >
                  🗑️
                </button>
              </div>
            </td>
          </tr>
        </template>
      </tbody>
    </table>

    <Pagination 
      v-model:currentPage="page"
      :totalPages="totalPages"
      v-model:pageSize="pageSize"
    />
  </div>

  <!-- Modals & Drawers -->
  <Drawer 
    :isOpen="isModalOpen" 
    @onClose="isModalOpen = false" 
    :title="editingId ? 'Editar Pedido' : 'Novo Pedido'"
    :subtitle="editingId ? 'Atualize as informações do pedido' : 'Cadastre um novo pedido no sistema'"
  >
    <div class="space-y-10">
      <!-- Seção: Informações do Cliente -->
      <div class="space-y-6">
        <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Informações do Cliente</p>
        <div class="grid grid-cols-1 gap-6">
          <div>
            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Nome Completo</label>
            <input 
              v-model="formData.customerName"
              class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold text-gray-900 focus:bg-white focus:border-primary-200 focus:ring-4 focus:ring-primary-500/5 transition-all"
              placeholder="Nome do cliente"
            />
          </div>
          <div>
            <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">E-mail de Contato</label>
            <input 
              v-model="formData.customerEmail"
              class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold text-gray-900 focus:bg-white focus:border-primary-200 focus:ring-4 focus:ring-primary-500/5 transition-all"
              placeholder="email@exemplo.com"
            />
          </div>
        </div>
      </div>
      
      <!-- Seção: Endereço -->
      <div class="space-y-6">
        <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Endereço de Entrega</p>
        <div>
          <input 
            v-model="formData.shippingAddress"
            class="w-full px-6 py-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none font-bold text-gray-900 focus:bg-white focus:border-primary-200 focus:ring-4 focus:ring-primary-500/5 transition-all"
            placeholder="Rua, Número, Cidade - UF, CEP"
          />
        </div>
      </div>

      <!-- Seção: Itens -->
      <div class="space-y-6">
        <div class="flex justify-between items-center">
          <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Itens do Pedido</p>
          <button 
            @click="handleAddItem"
            class="text-primary-600 font-black text-[10px] uppercase tracking-widest hover:text-primary-700 flex items-center gap-2 group"
          >
            <span class="text-lg group-hover:scale-125 transition-transform">+</span>
            Adicionar Item
          </button>
        </div>
        
        <div class="space-y-4">
          <div v-for="(item, index) in formData.items" :key="index" class="p-4 bg-gray-50 rounded-2xl border border-gray-100 flex gap-4 items-end animate-fade-in">
            <div class="flex-1">
              <label class="block text-[8px] font-black uppercase tracking-widest text-gray-300 mb-1">Produto</label>
              <Dropdown 
                variant="form"
                class="w-full"
                :modelValue="item.productId?.toString()"
                @update:modelValue="val => handleItemChange(index, 'productId', val)"
                placeholder="Selecionar Produto"
                :options="productOptions"
                :loading="productLoading"
                @loadMore="handleLoadMoreProducts"
              />
            </div>
            <div class="w-24">
              <label class="block text-[8px] font-black uppercase tracking-widest text-gray-300 mb-1">Qtd</label>
              <input 
                type="number"
                class="w-full px-4 py-3 bg-white border border-gray-100 rounded-xl outline-none font-bold text-sm text-gray-900 focus:border-primary-200 transition-all"
                v-model.number="item.quantity"
                min="1"
              />
            </div>
            <button 
              @click="handleRemoveItem(index)"
              class="w-10 h-10 flex items-center justify-center text-red-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all"
            >
              ✕
            </button>
          </div>
          
          <div v-if="formData.items.length === 0" class="text-center py-10 border-2 border-dashed border-gray-100 rounded-[2rem]">
            <p class="text-gray-300 text-sm font-medium italic">Nenhum item adicionado ao pedido.</p>
          </div>
        </div>
      </div>
    </div>

    <template #footer>
      <button 
        @click="handleSubmit"
        :disabled="formData.items.length === 0"
        class="w-full bg-primary-600 hover:bg-primary-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-black py-5 rounded-2xl shadow-xl shadow-primary-600/20 transition-all active:scale-95 flex items-center justify-center gap-3"
      >
        <span>{{ editingId ? 'Salvar Alterações' : 'Finalizar Pedido' }}</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </button>
    </template>
  </Drawer>

  <OrderDetailsModal 
    :isOpen="isDetailsOpen"
    @onClose="isDetailsOpen = false"
    :order="selectedOrder"
    @onStatusUpdated="fetchOrders"
  />
</div>
