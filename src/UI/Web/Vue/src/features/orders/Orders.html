<div class="p-12 max-w-[1600px] mx-auto animate-in fade-in duration-700">
  <header class="flex justify-between items-end mb-12">
    <div>
      <h1 class="text-5xl font-black text-gray-900 tracking-tighter">Pedidos</h1>
      <p class="text-gray-500 mt-3 font-medium text-lg">Histórico completo de transações.</p>
    </div>
    <div class="flex gap-4">
      <button class="bg-primary-600 hover:bg-primary-700 text-white font-black px-8 py-4 rounded-2xl shadow-lg shadow-primary-600/20 transition-all active:scale-95">
        + Novo Pedido
      </button>
    </div>
  </header>

  <!-- Filter Bar -->
  <div class="grid grid-cols-12 gap-6 items-end mb-10">
    <div class="col-span-3 relative group">
      <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-gray-400 group-focus-within:text-primary-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input 
        type="text"
        placeholder="Buscar pedido..."
        class="w-full pl-16 pr-8 py-5 bg-white border-none rounded-3xl shadow-xl shadow-gray-100/50 focus:ring-2 focus:ring-primary-600/20 outline-none transition-all font-bold text-gray-900 placeholder:text-gray-300"
        v-model="searchTerm"
        @keyup.enter="onFilter"
      />
    </div>

    <div class="col-span-4 grid grid-cols-2 bg-white rounded-3xl shadow-xl shadow-gray-100/50 p-2 gap-2">
      <div class="relative px-4 py-2 hover:bg-gray-50 rounded-2xl transition-colors">
        <label class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block mb-1">De</label>
        <input 
          type="date" 
          v-model="fromDate"
          @change="onFilter"
          class="bg-transparent border-none outline-none font-bold text-xs text-gray-900 w-full cursor-pointer"
        />
      </div>
      <div class="relative px-4 py-2 hover:bg-gray-50 rounded-2xl transition-colors border-l border-gray-50">
        <label class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-300 block mb-1">Até</label>
        <input 
          type="date" 
          v-model="toDate"
          @change="onFilter"
          class="bg-transparent border-none outline-none font-bold text-xs text-gray-900 w-full cursor-pointer"
        />
      </div>
    </div>

    <div class="col-span-3">
      <Dropdown 
        :options="statusOptions"
        v-model="status"
        @update:modelValue="onFilter"
      />
    </div>

    <div class="col-span-2 flex justify-end">
      <button 
        @click="clearFilters"
        class="group flex items-center gap-3 px-8 py-5 text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 hover:text-primary-600 transition-all"
      >
        <span class="group-hover:rotate-180 transition-transform duration-500">🔄</span>
        Limpar
      </button>
    </div>
  </div>

  <div v-if="loading" class="flex justify-center py-40 bg-white rounded-[3rem] shadow-xl shadow-gray-100/50">
    <div class="w-16 h-16 border-8 border-primary-600 border-t-transparent rounded-full animate-spin"></div>
  </div>
  <template v-else>
    <div class="bg-white rounded-[3rem] shadow-2xl shadow-gray-200/40 border border-gray-50 overflow-hidden">
      <table class="w-full text-left">
        <thead>
          <tr class="bg-gray-50/50">
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]"># Número</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Cliente</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Data</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Total</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Status</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Ações</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr v-for="order in orders" :key="order.id" class="hover:bg-gray-50/50 transition-colors group">
            <td class="px-10 py-8">
              <span class="font-black text-gray-900 tracking-tight">{{ order.orderNumber }}</span>
            </td>
            <td class="px-10 py-8">
              <span class="font-bold text-gray-500">{{ order.customerName }}</span>
            </td>
            <td class="px-10 py-8">
              <span class="text-xs font-bold text-gray-400">{{ new Date(order.createdAt).toLocaleString('pt-BR') }}</span>
            </td>
            <td class="px-10 py-8">
              <span class="font-black text-primary-600 text-lg">R$ {{ order.total.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) }}</span>
            </td>
            <td class="px-10 py-8">
              <span :class="['px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest', getStatusClass(order.status)]">
                {{ order.status }}
              </span>
            </td>
            <td class="px-10 py-8">
              <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <button class="p-3 hover:bg-primary-50 rounded-xl text-primary-600 transition-colors">👁️</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <Pagination 
      :page="page" 
      :totalPages="totalPages" 
      :totalItems="totalItems" 
      @update:page="onPageChange"
    />
  </template>
</div>
