<div class="p-12 max-w-[1600px] mx-auto animate-in fade-in duration-700">
  <header class="flex justify-between items-end mb-12">
    <div>
      <h1 class="text-5xl font-black text-gray-900 tracking-tighter">Produtos</h1>
      <p class="text-gray-500 mt-3 font-medium text-lg">Catálogo completo de itens.</p>
    </div>
    <div class="flex gap-4">
      <button 
        @click="openNew"
        class="bg-primary-600 hover:bg-primary-700 text-white font-black px-8 py-4 rounded-2xl shadow-lg shadow-primary-600/20 transition-all active:scale-95"
      >
        + Novo Produto
      </button>
    </div>
  </header>

  <!-- Filter Bar -->
  <div class="flex gap-6 items-center mb-10">
    <div class="flex-1 relative group">
      <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-gray-400 group-focus-within:text-primary-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input 
        type="text"
        placeholder="Buscar por nome ou categoria..."
        class="w-full pl-16 pr-8 py-5 bg-white border-none rounded-3xl shadow-xl shadow-gray-100/50 focus:ring-2 focus:ring-primary-600/20 outline-none transition-all font-bold text-gray-900 placeholder:text-gray-300"
        v-model="searchTerm"
        @keyup.enter="onSearch"
      />
    </div>
    
    <div class="flex bg-white p-2 rounded-[2rem] shadow-xl shadow-gray-100/50 gap-1">
      <button
        @click="onStatusFilter(undefined)"
        :class="['px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all', isActive === undefined ? 'bg-gray-900 text-white shadow-lg' : 'text-gray-400 hover:bg-gray-50']"
      >
        Todos
      </button>
      <button
        @click="onStatusFilter(true)"
        :class="['px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all', isActive === true ? 'bg-gray-900 text-white shadow-lg' : 'text-gray-400 hover:bg-gray-50']"
      >
        Ativos
      </button>
      <button
        @click="onStatusFilter(false)"
        :class="['px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all', isActive === false ? 'bg-gray-900 text-white shadow-lg' : 'text-gray-400 hover:bg-gray-50']"
      >
        Inativos
      </button>
    </div>
  </div>

  <div v-if="loading" class="flex justify-center py-40 bg-white rounded-[3rem] shadow-xl shadow-gray-100/50">
    <div class="w-16 h-16 border-8 border-primary-600 border-t-transparent rounded-full animate-spin"></div>
  </div>
  <template v-else>
    <div class="bg-white rounded-[3rem] shadow-2xl shadow-gray-200/40 border border-gray-50 overflow-hidden">
      <table class="w-full text-left">
        <thead>
          <tr class="bg-gray-50/50">
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Produto</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Categoria</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Preço</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Estoque</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Status</th>
            <th class="px-10 py-8 text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Ações</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <tr v-for="product in products" :key="product.id" class="hover:bg-gray-50/50 transition-colors group">
            <td class="px-10 py-8">
              <div class="flex items-center gap-6">
                <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                  📦
                </div>
                <span class="font-black text-gray-900 text-lg tracking-tight">{{ product.name }}</span>
              </div>
            </td>
            <td class="px-10 py-8">
              <span class="px-4 py-2 bg-gray-50 rounded-xl text-gray-500 font-bold text-xs uppercase tracking-wider">
                {{ product.category }}
              </span>
            </td>
            <td class="px-10 py-8">
              <span class="font-black text-primary-600 text-lg">R$ {{ product.price.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) }}</span>
            </td>
            <td class="px-10 py-8">
              <div class="flex items-baseline gap-1">
                <span class="font-black text-gray-900 text-lg">{{ product.stock }}</span>
                <span class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">unid</span>
              </div>
            </td>
            <td class="px-10 py-8">
              <span :class="['px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest', product.isActive ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600']">
                {{ product.isActive ? 'Ativo' : 'Inativo' }}
              </span>
            </td>
            <td class="px-10 py-8">
              <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <button @click="openEdit(product)" class="p-3 hover:bg-primary-50 rounded-xl text-primary-600 transition-colors">
                  ✏️
                </button>
                <button @click="deleteProduct(product.id)" class="p-3 hover:bg-red-50 rounded-xl text-red-600 transition-colors">
                  🗑️
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <Pagination 
      :page="page" 
      :totalPages="totalPages" 
      :totalItems="totalItems" 
      @update:page="onPageChange"
    />
  </template>
</div>

<!-- Product Modal -->
<Modal :show="showModal" :title="modalTitle" @close="showModal = false">
  <form @submit.prevent="save" class="space-y-8">
    <div class="space-y-3">
      <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 ml-4">Nome do Produto</label>
      <input 
        type="text" 
        v-model="formData.name" 
        class="w-full px-8 py-5 bg-gray-50 border-none rounded-3xl outline-none font-bold text-gray-900 focus:ring-2 focus:ring-primary-600/10 transition-all"
        placeholder="Ex: Teclado Mecânico"
        required
      />
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div class="space-y-3">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 ml-4">Categoria</label>
        <input 
          type="text" 
          v-model="formData.category" 
          class="w-full px-8 py-5 bg-gray-50 border-none rounded-3xl outline-none font-bold text-gray-900 focus:ring-2 focus:ring-primary-600/10 transition-all"
          placeholder="Ex: Hardware"
          required
        />
      </div>
      <div class="space-y-3">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 ml-4">Preço (R$)</label>
        <input 
          type="number" 
          v-model="formData.price" 
          class="w-full px-8 py-5 bg-gray-50 border-none rounded-3xl outline-none font-bold text-gray-900 focus:ring-2 focus:ring-primary-600/10 transition-all"
          required
        />
      </div>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div class="space-y-3">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 ml-4">Estoque Inicial</label>
        <input 
          type="number" 
          v-model="formData.stock" 
          class="w-full px-8 py-5 bg-gray-50 border-none rounded-3xl outline-none font-bold text-gray-900 focus:ring-2 focus:ring-primary-600/10 transition-all"
          required
        />
      </div>
      <div class="space-y-3">
        <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 ml-4">Status</label>
        <div class="flex items-center gap-4 px-8 py-5 bg-gray-50 rounded-3xl">
          <input 
            type="checkbox" 
            v-model="formData.isActive" 
            class="w-6 h-6 rounded-lg text-primary-600 focus:ring-primary-600/20 border-none bg-gray-200"
          />
          <span class="text-xs font-black uppercase tracking-widest text-gray-600">Produto Ativo</span>
        </div>
      </div>
    </div>

    <div class="pt-6 flex gap-4">
      <button 
        type="button"
        @click="showModal = false"
        class="flex-1 px-8 py-5 rounded-3xl font-black text-xs uppercase tracking-widest text-gray-400 hover:bg-gray-50 transition-all"
      >
        Cancelar
      </button>
      <button 
        type="submit"
        class="flex-2 bg-primary-600 hover:bg-primary-700 text-white font-black px-12 py-5 rounded-3xl shadow-xl shadow-primary-600/20 transition-all active:scale-95"
      >
        Confirmar e Salvar
      </button>
    </div>
  </form>
</Modal>
