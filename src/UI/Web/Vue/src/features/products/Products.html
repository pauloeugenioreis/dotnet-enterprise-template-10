<div class="animate-in fade-in duration-700">
  <header class="flex justify-between items-end mb-16">
    <div>
      <h1 class="text-6xl font-black text-gray-900 tracking-tighter">Produtos</h1>
      <p class="text-gray-500 mt-4 font-medium text-xl">Catálogo completo de itens.</p>
    </div>
    <div class="flex gap-4">
      <button
        @click="handleExport"
        class="p-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md text-gray-400 hover:text-primary-600 transition-all active:scale-95"
        title="Exportar para Excel"
      >
        📊
      </button>
      <button
        @click="handleOpenNew"
        class="bg-primary-600 hover:bg-primary-700 text-white font-black px-8 py-4 rounded-2xl shadow-lg shadow-primary-600/20 transition-all active:scale-95"
      >
        + Novo Produto
      </button>
    </div>
  </header>

  <!-- Filter Bar -->
  <div class="flex gap-6 items-center mb-10">
    <div class="flex-1 relative group">
      <div class="absolute inset-y-0 left-6 flex items-center pointer-events-none">
        <svg class="w-5 h-5 text-gray-400 group-focus-within:text-primary-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input
        v-model="searchTerm"
        type="text"
        placeholder="Buscar por nome ou categoria..."
        class="w-full pl-16 pr-8 py-5 bg-white border-none rounded-3xl shadow-xl shadow-gray-100/50 focus:ring-2 focus:ring-primary-600/20 outline-none transition-all font-bold text-gray-900 placeholder:text-gray-300"
      />
    </div>

    <div class="flex bg-white p-2 rounded-[2rem] shadow-xl shadow-gray-100/50 gap-1">
      <button
        v-for="status in statusFilters"
        :key="status.label"
        @click="isActiveFilter = status.value"
        class="px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest transition-all"
        :class="[
          isActiveFilter === status.value
          ? 'bg-gray-900 text-white shadow-lg'
          : 'text-gray-400 hover:bg-gray-50'
        ]"
      >
        {{ status.label }}
      </button>
    </div>
  </div>

  <div class="bg-white rounded-[3rem] shadow-2xl shadow-gray-200/40 border border-gray-50 overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead class="bg-primary-600">
        <tr>
          <th class="px-10 py-8 text-[10px] font-black text-white uppercase tracking-[0.2em]">Produto</th>
          <th class="px-10 py-8 text-[10px] font-black text-white uppercase tracking-[0.2em]">Categoria</th>
          <th class="px-10 py-8 text-[10px] font-black text-white uppercase tracking-[0.2em]">Preço</th>
          <th class="px-10 py-8 text-[10px] font-black text-white uppercase tracking-[0.2em]">Estoque</th>
          <th class="px-10 py-8 text-[10px] font-black text-white uppercase tracking-[0.2em]">Status</th>
          <th class="px-10 py-8 text-[10px] font-black text-white uppercase tracking-[0.2em]">Ações</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-50">
        <template v-if="loading">
          <tr><td colspan="6" class="p-20 text-center"><div class="w-10 h-10 border-4 border-primary-600 border-t-transparent rounded-full animate-spin mx-auto" /></td></tr>
        </template>
        <template v-else>
          <tr v-for="product in products" :key="product.id" class="hover:bg-gray-50/50 transition-colors group">
            <td class="px-10 py-8">
                <div class="flex items-center gap-6">
                  <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                  📦
                </div>
                  <span class="font-black text-gray-900 text-lg tracking-tight">
                  {{ product.name }}
                </span>
              </div>
            </td>
            <td class="px-10 py-8">
              <span class="px-4 py-2 bg-gray-50 rounded-xl text-gray-500 font-bold text-xs uppercase tracking-wider">
                {{ product.category }}
              </span>
            </td>
            <td class="px-10 py-8">
              <span class="font-black text-primary-600 text-lg">
              R$ {{ product.price.toLocaleString('pt-BR') }}
              </span>
            </td>
            <td class="px-10 py-8">
              <div class="flex items-baseline gap-1">
                <span class="font-black text-gray-900 text-lg">{{ product.stock }}</span>
                <span class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">unid</span>
              </div>
            </td>
            <td class="px-10 py-8">
              <span :class="['px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest', product.isActive ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600']">
                {{ product.isActive ? 'Ativo' : 'Inativo' }}
              </span>
            </td>
            <td class="px-10 py-8">
              <div class="flex gap-2">
                <button
                  @click="handleEdit(product)"
                  class="w-10 h-10 flex items-center justify-center bg-gray-50 hover:bg-primary-50 rounded-xl text-primary-600 transition-all active:scale-90"
                  title="Editar"
                >
                  ✏️
                </button>
                <button
                  @click="handleDelete(product.id)"
                  class="w-10 h-10 flex items-center justify-center bg-gray-50 hover:bg-red-50 rounded-xl text-red-600 transition-all active:scale-90"
                  title="Excluir"
                >
                  🗑️
                </button>
              </div>
            </td>
          </tr>
        </template>
      </tbody>
    </table>

    <Pagination
      v-model:currentPage="page"
      :totalPages="totalPages"
      v-model:pageSize="pageSize"
    />
  </div>

  <!-- Modal Produto -->
  <Modal
    :isOpen="isModalOpen"
    @onClose="isModalOpen = false"
    :title="editingId ? 'Editar Produto' : 'Novo Produto'"
  >
    <form @submit.prevent="handleSubmit" class="space-y-6">
      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Nome do Produto</label>
        <input
          v-model="formData.name"
          required
          class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-primary-600 outline-none transition-all font-bold text-gray-900"
          placeholder="Ex: Teclado Mecânico"
        />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Preço (R$)</label>
          <input
            v-model="formData.price"
            required
            type="number" step="0.01"
            class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-primary-600 outline-none transition-all font-bold text-gray-900"
            placeholder="0.00"
          />
        </div>
        <div>
          <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Estoque</label>
          <input
            v-model="formData.stock"
            required
            type="number"
            class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-primary-600 outline-none transition-all font-bold text-gray-900"
            placeholder="0"
          />
        </div>
      </div>
      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Categoria</label>
        <input
          v-model="formData.category"
          required
          class="w-full px-6 py-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-primary-600 outline-none transition-all font-bold text-gray-900"
          placeholder="Ex: Periféricos"
        />
      </div>
      <div class="flex items-center gap-3 bg-gray-50 p-4 rounded-2xl">
        <input
          v-model="formData.isActive"
          type="checkbox"
          id="isActive"
          class="w-5 h-5 accent-primary-600"
        />
        <label htmlFor="isActive" class="text-sm font-bold text-gray-700 cursor-pointer">Produto Ativo</label>
      </div>
      <button
        type="submit"
        class="w-full bg-primary-600 hover:bg-primary-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-primary-600/20 transition-all active:scale-[0.98]"
      >
        {{ editingId ? 'Atualizar Produto' : 'Salvar Produto' }}
      </button>
    </form>
  </Modal>

  <!-- Modal Confirmação -->
  <ConfirmModal
    :isOpen="isDeleteModalOpen"
    message="Deseja excluir este produto?"
    @confirm="confirmDelete"
    @cancel="isDeleteModalOpen = false"
  />
</div>
