<div class="p-10 max-w-7xl mx-auto space-y-10 animate-fade-in">
  <header class="flex justify-between items-end">
    <div>
      <h1 class="text-5xl font-black text-gray-900 tracking-tighter">Produtos</h1>
      <p class="text-gray-500 mt-3 font-medium text-lg">Catálogo e estoque enterprise.</p>
    </div>
    <button class="bg-primary-600 hover:bg-primary-700 text-white font-black px-8 py-4 rounded-2xl shadow-lg transition-all active:scale-95">
      + Novo Produto
    </button>
  </header>

  <div v-if="loading" class="grid grid-cols-1 md:grid-cols-3 gap-8">
    <div v-for="i in 3" :key="i" class="h-80 bg-gray-100 rounded-[2.5rem] animate-pulse"></div>
  </div>

  <div v-else class="grid grid-cols-1 md:grid-cols-3 gap-8">
    <div v-for="product in products" :key="product.id" class="bg-white rounded-[2.5rem] p-8 border border-gray-50 shadow-sm hover:shadow-2xl transition-all group overflow-hidden">
      <div class="w-20 h-20 bg-gray-50 rounded-2xl flex items-center justify-center text-4xl mb-6 group-hover:scale-110 transition-transform">
        📦
      </div>
      <h3 class="text-xl font-black text-gray-900 mb-2">{{ product.name }}</h3>
      <p class="text-gray-400 text-sm font-medium mb-6">{{ product.category }}</p>
      
      <div class="flex justify-between items-center pt-6 border-t border-gray-50">
        <div class="text-2xl font-black text-primary-600">
          R$ {{ product.price.toLocaleString() }}
        </div>
        <span class="text-[10px] font-black uppercase tracking-widest text-gray-300">
          Qtd: {{ product.stockQuantity }}
        </span>
      </div>
    </div>
  </div>
</div>
