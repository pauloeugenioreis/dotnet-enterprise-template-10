<div class="max-w-7xl mx-auto space-y-10 animate-fade-in">
  <header>
    <h1 class="text-5xl font-black text-gray-900 tracking-tighter">Dashboard</h1>
    <p class="text-gray-500 mt-3 font-medium text-lg">Performance em tempo real.</p>
  </header>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    <div v-for="(stat, i) in stats" :key="i" class="bg-white p-10 rounded-[2.5rem] border border-gray-50 shadow-sm hover:shadow-2xl transition-all group cursor-default">
      <div :class="[stat.color, 'w-16 h-16 rounded-2xl flex items-center justify-center mb-6 text-3xl group-hover:scale-110 transition-transform']">
        {{ stat.icon }}
      </div>
      <p class="text-gray-400 text-xs font-black uppercase tracking-[0.2em] mb-2">{{ stat.label }}</p>
      <h2 class="text-4xl font-black text-gray-900">{{ stat.value }}</h2>
    </div>
  </div>

  <!-- Latest Orders Table Preview -->
  <div class="bg-white rounded-[3rem] border border-gray-50 shadow-xl overflow-hidden">
    <div class="p-10 border-b border-gray-50 flex justify-between items-center">
      <h3 class="text-2xl font-black text-gray-900">Últimos Pedidos</h3>
      <router-link 
        to="/orders"
        class="text-primary-600 font-black text-sm uppercase tracking-widest hover:underline"
      >
        Ver Todos
      </router-link>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50/50">
          <tr>
            <th class="px-10 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">Pedido</th>
            <th class="px-10 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">Cliente</th>
            <th class="px-10 py-5 text-xs font-black text-gray-400 uppercase tracking-widest">Total</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <template v-if="loading">
            <tr><td colspan="3" class="p-10 text-center font-bold text-gray-300">Carregando...</td></tr>
          </template>
          <template v-else>
            <tr v-for="order in latestOrders" :key="order.id" class="hover:bg-gray-50/50 transition-colors">
              <td class="px-10 py-6 font-black text-gray-900">#{{ order.orderNumber }}</td>
              <td class="px-10 py-6 text-gray-500 font-medium">{{ order.customerName }}</td>
              <td class="px-10 py-6 font-black text-primary-600">R$ {{ order.total.toLocaleString('pt-BR') }}</td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
