<div class="w-full space-y-10 animate-fade-in">
  <header>
    <h1 class="text-6xl font-extrabold text-slate-900 tracking-tight">Dashboard</h1>
    <p class="text-gray-500 mt-3 font-medium text-xl">Performance em tempo real.</p>
  </header>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
    <div v-for="(stat, i) in stats" :key="i" class="bg-white p-10 rounded-[3rem] shadow-xl shadow-gray-200/50 border border-gray-50 flex flex-col gap-6 group cursor-default">
      <div :class="[stat.color, 'w-16 h-16 rounded-2xl flex items-center justify-center mb-0 text-3xl group-hover:scale-110 transition-transform']">
        {{ stat.icon }}
      </div>
      <div>
        <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-2">{{ stat.label }}</p>
        <h2 class="text-4xl font-black text-gray-900 tracking-tighter">{{ stat.value }}</h2>
      </div>
    </div>
  </div>

  <!-- Latest Orders Table Preview -->
  <div class="bg-white rounded-[3.5rem] shadow-2xl shadow-gray-200/60 border border-gray-50 overflow-hidden">
    <div class="p-12 border-b border-gray-50 flex justify-between items-center">
      <h3 class="text-3xl font-black text-gray-900 tracking-tight">Últimos Pedidos</h3>
      <router-link 
        to="/orders"
        class="text-[10px] font-black text-primary-600 uppercase tracking-[0.2em] hover:bg-primary-50 px-6 py-3 rounded-xl transition-all"
      >
        Ver Todos
      </router-link>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50/30">
          <tr>
            <th class="px-12 py-8 text-[10px] font-black text-gray-300 uppercase tracking-[0.2em]">Pedido</th>
            <th class="px-12 py-8 text-[10px] font-black text-gray-300 uppercase tracking-[0.2em]">Cliente</th>
            <th class="px-12 py-8 text-[10px] font-black text-gray-300 uppercase tracking-[0.2em]">Total</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          <template v-if="loading">
            <tr><td colspan="3" class="px-12 py-8 animate-pulse bg-gray-50/50 h-20"></td></tr>
          </template>
          <template v-else>
            <tr v-for="order in latestOrders" :key="order.id" class="hover:bg-gray-50/30 transition-colors group">
              <td class="px-12 py-10 font-black text-gray-900 tracking-tight text-lg">#{{ order.orderNumber }}</td>
              <td class="px-12 py-10 font-bold text-gray-500 text-lg">{{ order.customerName }}</td>
              <td class="px-12 py-10 font-black text-primary-600 text-xl tracking-tight">R$ {{ order.total.toLocaleString('pt-BR', { minimumFractionDigits: 2 }) }}</td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</div>
