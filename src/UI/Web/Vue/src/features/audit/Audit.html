<div class="p-10 max-w-7xl mx-auto space-y-10 animate-fade-in">
  <header>
    <h1 class="text-5xl font-black text-gray-900 tracking-tighter">Auditoria</h1>
    <p class="text-gray-500 mt-3 font-medium text-lg">Histórico de Eventos (Event Sourcing).</p>
  </header>

  <div class="bg-white rounded-[3rem] border border-gray-50 shadow-2xl overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead class="bg-gray-900 text-white">
        <tr>
          <th class="px-10 py-6 text-xs font-black uppercase tracking-widest">Evento</th>
          <th class="px-10 py-6 text-xs font-black uppercase tracking-widest">Entidade</th>
          <th class="px-10 py-6 text-xs font-black uppercase tracking-widest">Usuário</th>
          <th class="px-10 py-6 text-xs font-black uppercase tracking-widest">Data</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr v-if="loading"><td colSpan="4" class="p-20 text-center"><div class="w-10 h-10 border-4 border-primary-600 border-t-transparent rounded-full animate-spin mx-auto"></div></td></tr>
        <tr v-for="log in logs" :key="log.eventId" class="hover:bg-gray-50/50 transition-colors">
          <td class="px-10 py-6">
            <span class="px-4 py-2 bg-primary-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest">
              {{ log.eventType }}
            </span>
          </td>
          <td class="px-10 py-6 font-black text-gray-900">{{ log.aggregateType }}</td>
          <td class="px-10 py-6 text-gray-400 font-mono text-xs">{{ log.userId }}</td>
          <td class="px-10 py-6 text-gray-500 font-bold">
            {{ new Date(log.occurredOn).toLocaleString() }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
