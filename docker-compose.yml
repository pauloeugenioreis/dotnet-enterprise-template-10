services:
  api:
    container_name: api
    build:
      context: .
      dockerfile: src/Server/Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - AppSettings__Infrastructure__Database__DatabaseType=${DB_TYPE:-PostgreSQL}
      - AppSettings__Infrastructure__Database__ConnectionString=${DB_CONNECTION_STRING:-Host=postgres;Database=ProjectTemplate;Username=postgres;Password=PostgresPass123;Port=5432}
      - AppSettings__Infrastructure__EventSourcing__Enabled=true
      - AppSettings__Infrastructure__EventSourcing__ConnectionString=${DB_EVENTS_CONNECTION_STRING:-Host=postgres-events;Database=ProjectTemplateEvents;Username=postgres;Password=postgres}
      - AppSettings__Infrastructure__Redis__ConnectionString=redis:6379
      - AppSettings__Infrastructure__RabbitMQ__ConnectionString=amqp://guest:guest@rabbitmq:5672
      - AppSettings__Infrastructure__MongoDB__ConnectionString=mongodb://mongodb:27017/ProjectTemplateMongo
      - AppSettings__Infrastructure__Telemetry__Enabled=true
      - AppSettings__Infrastructure__Telemetry__Providers__0=jaeger
      - AppSettings__Infrastructure__Telemetry__Providers__1=prometheus
      - AppSettings__Infrastructure__Telemetry__Jaeger__Host=jaeger
      - AppSettings__Infrastructure__Telemetry__Jaeger__Port=4317
      - AppSettings__Infrastructure__Telemetry__Jaeger__UseGrpc=true
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    networks:
      - app-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Oracle Database - Free Edition
  oracle:
    image: gvenzl/oracle-free:latest
    container_name: oracle
    environment:
      - ORACLE_PASSWORD=OraclePass123
      - ORACLE_DATABASE=ProjectTemplate
      - APP_USER=appuser
      - APP_USER_PASSWORD=AppPass123
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # PostgreSQL - Main Database
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=ProjectTemplate
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=PostgresPass123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL Database
  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=MySqlPass123
      - MYSQL_DATABASE=ProjectTemplate
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=AppPass123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pMySqlPass123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PostgreSQL - Event Store for Event Sourcing
  postgres-events:
    image: postgres:17-alpine
    container_name: postgres-events
    environment:
      - POSTGRES_DB=ProjectTemplateEvents
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-events-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Distributed Cache
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - NoSQL Database
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger - Distributed Tracing (using OTLP protocol)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"     # Jaeger UI
      - "4317:4317"       # OTLP gRPC receiver (PRIMARY - replaces deprecated 6831)
      - "4318:4318"       # OTLP HTTP receiver (PRIMARY)
      - "14250:14250"     # Jaeger gRPC
      - "9411:9411"       # Zipkin compatible endpoint
      # Legacy ports (deprecated, kept for backward compatibility):
      # - "5775:5775/udp"   # deprecated: zipkin.thrift compact
      # - "6831:6831/udp"   # deprecated: jaeger.thrift compact (use OTLP 4317 instead)
      # - "6832:6832/udp"   # deprecated: jaeger.thrift binary
      # - "5778:5778"       # deprecated: serve configs
      # - "14268:14268"     # deprecated: jaeger.thrift HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_HTTP_ENABLED=true
      - COLLECTOR_OTLP_GRPC_HOST_PORT=0.0.0.0:4317
      - COLLECTOR_OTLP_HTTP_HOST_PORT=0.0.0.0:4318
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - METRICS_STORAGE_TYPE=prometheus
      - LOG_LEVEL=info
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector (Optional - Advanced)
  # Uncomment if you want a centralized collector
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   container_name: otel-collector
  #   command: ["--config=/etc/otel-collector-config.yaml"]
  #   volumes:
  #     - ./monitoring/otel-collector/config.yaml:/etc/otel-collector-config.yaml
  #   ports:
  #     - "4317:4317"   # OTLP gRPC receiver
  #     - "4318:4318"   # OTLP HTTP receiver
  #     - "8888:8888"   # Prometheus metrics exposed by the collector
  #     - "8889:8889"   # Prometheus exporter metrics
  # Blazor Web Application
  blazor-app:
    container_name: web-blazor
    build:
      context: .
      dockerfile: src/UI/Web/Blazor/WebApp/App/Dockerfile
    ports:
      - "5188:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiBaseUrl=http://api:8080
    depends_on:
      - api
    networks:
      - app-network

  # Angular Web Application
  angular-web:
    container_name: web-angular
    build:
      context: src/UI/Web/Angular
      dockerfile: Dockerfile
    environment:
      - API_URL=http://localhost:5000
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - app-network

  # React Web Application
  react-web:
    container_name: web-react
    build:
      context: src/UI/Web/React
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5000
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
    depends_on:
      - api
    networks:
      - app-network

  # Vue Web Application
  vue-web:
    container_name: web-vue
    build:
      context: src/UI/Web/Vue
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5000
    ports:
      - "5174:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
    depends_on:
      - api
    networks:
      - app-network

  # Welcome service to display access links
  welcome:
    image: alpine
    container_name: welcome
    command: >
      /bin/sh -c "
      echo ' ' &&
      echo '🚀 Aplicações (Frontends & API)' &&
      echo 'API (.NET 10):       http://localhost:5000' &&
      echo 'Angular:             http://localhost:4200' &&
      echo 'React:               http://localhost:5173' &&
      echo 'Vue:                 http://localhost:5174' &&
      echo 'Blazor WebApp:       http://localhost:5188' &&
      echo ' ' &&
      echo '📊 Observabilidade & Infraestrutura' &&
      echo 'Grafana:             http://localhost:3000' &&
      echo 'Jaeger:              http://localhost:16686' &&
      echo 'RabbitMQ Management: http://localhost:15672' &&
      echo 'Prometheus:          http://localhost:9090' &&
      echo ' '"
    depends_on:
      api: { condition: service_started }
      angular-web: { condition: service_started }
      react-web: { condition: service_started }
      vue-web: { condition: service_started }
      blazor-app: { condition: service_started }
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  sqlserver-data:
  oracle-data:
  postgres-data:
  mysql-data:
  postgres-events-data:
  prometheus-data:
  grafana-data:
  mongodb-data:

